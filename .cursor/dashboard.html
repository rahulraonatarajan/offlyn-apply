<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Issues Dashboard - Axe Simplify</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header .date {
            color: #718096;
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card .number {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #718096;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card.resolved .number { color: #48bb78; }
        .stat-card.in-progress .number { color: #ed8936; }
        .stat-card.blocked .number { color: #f56565; }
        .stat-card.total .number { color: #4299e1; }

        .controls {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .controls button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .controls button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .controls input[type="text"] {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            min-width: 250px;
        }

        .controls input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 20px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85em;
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        tbody tr:hover {
            background: #f7fafc;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            padding: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-resolved {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-in-progress {
            background: #feebc8;
            color: #7c2d12;
        }

        .status-blocked {
            background: #fed7d7;
            color: #742a2a;
        }

        .severity-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
        }

        .severity-critical { background: #fc8181; color: white; }
        .severity-high { background: #f6ad55; color: white; }
        .severity-medium { background: #68d391; color: white; }
        .severity-low { background: #90cdf4; color: white; }

        .issue-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .issue-description {
            color: #718096;
            font-size: 0.9em;
        }

        .time-badge {
            background: #edf2f7;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            color: #4a5568;
        }

        .fix-applied {
            background: #f0fff4;
            border-left: 3px solid #48bb78;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 0.9em;
            color: #2d3748;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #2d3748;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .last-updated {
            color: #718096;
            font-size: 0.9em;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Today's Issues Dashboard</h1>
            <div class="date" id="currentDate"></div>
            <div class="last-updated" id="lastUpdated">Auto-refresh every 5 seconds</div>
        </div>

        <!-- Current AI Work Section -->
        <div id="currentWorkSection" style="display: none; background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 15px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1); margin-bottom: 30px; border-left: 5px solid #667eea;">
            <h2 style="color: #667eea; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <span style="animation: pulse 2s infinite;">🤖</span>
                Current AI Initiatives
            </h2>
            <div id="currentWorkContent" style="color: #4a5568; line-height: 1.6;"></div>
        </div>

        <style>
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
        </style>

        <div class="stats">
            <div class="stat-card resolved">
                <div class="number" id="resolvedCount">0</div>
                <div class="label">Resolved</div>
            </div>
            <div class="stat-card in-progress">
                <div class="number" id="inProgressCount">0</div>
                <div class="label">In Progress</div>
            </div>
            <div class="stat-card blocked">
                <div class="number" id="blockedCount">0</div>
                <div class="label">Blocked</div>
            </div>
            <div class="stat-card total">
                <div class="number" id="totalCount">0</div>
                <div class="label">Total Issues</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="showAddIssueModal()">➕ Add Issue</button>
            <button onclick="exportToJSON()">💾 Export JSON</button>
            <button onclick="refreshDashboard()">🔄 Refresh</button>
            <input type="text" id="searchInput" placeholder="🔍 Search issues..." onkeyup="filterIssues()">
        </div>

        <div class="table-container">
            <table id="issuesTable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Issue</th>
                        <th>Status</th>
                        <th>Severity</th>
                        <th>Fix Applied</th>
                        <th>Files Affected</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="issuesTableBody">
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                                <h3>No issues tracked today</h3>
                                <p>Click "Add Issue" to start tracking your development work</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Issue Modal -->
    <div class="modal" id="addIssueModal">
        <div class="modal-content">
            <h2>Add New Issue</h2>
            <form id="addIssueForm" onsubmit="addIssue(event)">
                <div class="form-group">
                    <label>Issue Title *</label>
                    <input type="text" id="issueTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="issueDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Status *</label>
                    <select id="issueStatus" required>
                        <option value="in-progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                        <option value="blocked">Blocked</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Severity *</label>
                    <select id="issueSeverity" required>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fix Applied</label>
                    <textarea id="issueFix" placeholder="Describe the solution or fix applied..."></textarea>
                </div>
                <div class="form-group">
                    <label>Files Affected (comma-separated)</label>
                    <input type="text" id="issueFiles" placeholder="src/content.ts, src/shared/react-input.ts">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Add Issue</button>
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let issues = [];
        const STORAGE_KEY = 'axesimplify-daily-issues';
        const CURRENT_WORK_KEY = 'axesimplify-current-work';

        // Initialize
        function init() {
            updateCurrentDate();
            loadIssues();
            renderIssues();
            loadCurrentWork();
            
            // Auto-refresh every 5 seconds
            setInterval(() => {
                loadIssues();
                renderIssues();
                loadCurrentWork();
                updateLastRefresh();
            }, 5000);
            
            // Expose global function for external updates
            window.addIssueToDashboard = addIssueToDashboard;
            window.updateCurrentWork = updateCurrentWork;
        }

        function updateLastRefresh() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            document.getElementById('lastUpdated').textContent = `Last updated: ${timeStr}`;
        }

        function loadCurrentWork() {
            const currentWork = localStorage.getItem(CURRENT_WORK_KEY);
            if (currentWork) {
                const work = JSON.parse(currentWork);
                const now = Date.now();
                const age = now - new Date(work.timestamp).getTime();
                
                // Only show if less than 10 minutes old
                if (age < 600000) {
                    displayCurrentWork(work);
                } else {
                    hideCurrentWork();
                }
            } else {
                hideCurrentWork();
            }
        }

        function displayCurrentWork(work) {
            const section = document.getElementById('currentWorkSection');
            const content = document.getElementById('currentWorkContent');
            
            const tasks = work.tasks.map(task => `
                <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid ${getStatusColor(task.status)};">
                    <div style="font-weight: 600; color: #2d3748; margin-bottom: 5px;">
                        ${getStatusIcon(task.status)} ${escapeHtml(task.title)}
                    </div>
                    ${task.description ? `<div style="font-size: 0.9em; color: #718096; margin-bottom: 5px;">${escapeHtml(task.description)}</div>` : ''}
                    <div style="display: flex; gap: 10px; font-size: 0.85em; color: #a0aec0;">
                        <span>Started: ${formatTime(task.startTime)}</span>
                        ${task.files ? `<span>📄 ${task.files}</span>` : ''}
                    </div>
                </div>
            `).join('');
            
            content.innerHTML = tasks;
            section.style.display = 'block';
        }

        function hideCurrentWork() {
            document.getElementById('currentWorkSection').style.display = 'none';
        }

        function getStatusColor(status) {
            const colors = {
                'in-progress': '#ed8936',
                'resolved': '#48bb78',
                'blocked': '#f56565'
            };
            return colors[status] || '#4299e1';
        }

        function getStatusIcon(status) {
            const icons = {
                'in-progress': '🔄',
                'resolved': '✅',
                'blocked': '🚫'
            };
            return icons[status] || '📝';
        }

        // External API for AI to update current work
        function updateCurrentWork(tasks) {
            const work = {
                timestamp: new Date().toISOString(),
                tasks: tasks
            };
            localStorage.setItem(CURRENT_WORK_KEY, JSON.stringify(work));
            loadCurrentWork();
        }

        // External API for AI to add issues
        function addIssueToDashboard(issueData) {
            const newIssue = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                title: issueData.title,
                description: issueData.description || '',
                status: issueData.status || 'in-progress',
                severity: issueData.severity || 'medium',
                fix: issueData.fix || '',
                files: issueData.files || ''
            };
            
            issues.unshift(newIssue);
            saveIssues();
            renderIssues();
            
            return newIssue;
        }

        function updateCurrentDate() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', options);
        }

        function loadIssues() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const data = JSON.parse(stored);
                const today = new Date().toDateString();
                
                // Only load today's issues
                if (data.date === today) {
                    issues = data.issues;
                } else {
                    // New day, archive old issues and start fresh
                    archiveOldIssues(data);
                    issues = [];
                    saveIssues();
                }
            }
        }

        function saveIssues() {
            const data = {
                date: new Date().toDateString(),
                issues: issues,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function archiveOldIssues(oldData) {
            const archiveKey = `${STORAGE_KEY}-archive`;
            let archive = JSON.parse(localStorage.getItem(archiveKey) || '[]');
            archive.push(oldData);
            
            // Keep only last 30 days
            if (archive.length > 30) {
                archive = archive.slice(-30);
            }
            
            localStorage.setItem(archiveKey, JSON.stringify(archive));
        }

        function renderIssues() {
            const tbody = document.getElementById('issuesTableBody');
            const filteredIssues = filterIssuesBySearch();
            
            // Update stats
            updateStats(issues); // Use all issues for stats, not filtered
            
            if (filteredIssues.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                                <h3>No issues found</h3>
                                <p>Try adjusting your search or add a new issue</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filteredIssues.map((issue, index) => `
                <tr>
                    <td>
                        <span class="time-badge">${formatTime(issue.timestamp)}</span>
                    </td>
                    <td>
                        <div class="issue-title">${escapeHtml(issue.title)}</div>
                        ${issue.description ? `<div class="issue-description">${escapeHtml(issue.description)}</div>` : ''}
                    </td>
                    <td>
                        <span class="status-badge status-${issue.status}">${getStatusText(issue.status)}</span>
                    </td>
                    <td>
                        <span class="severity-badge severity-${issue.severity}">${issue.severity.toUpperCase()}</span>
                    </td>
                    <td>
                        ${issue.fix ? `<div class="fix-applied">${escapeHtml(issue.fix)}</div>` : '<span style="color: #a0aec0;">No fix yet</span>'}
                    </td>
                    <td>
                        ${issue.files ? issue.files.split(',').map(f => `<div style="font-size: 0.85em; color: #4a5568; margin-bottom: 3px;">📄 ${escapeHtml(f.trim())}</div>`).join('') : '-'}
                    </td>
                    <td>
                        <button onclick="deleteIssue(${issues.indexOf(issue)})" style="background: #fc8181; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85em;">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(issuesList) {
            const resolved = issuesList.filter(i => i.status === 'resolved').length;
            const inProgress = issuesList.filter(i => i.status === 'in-progress').length;
            const blocked = issuesList.filter(i => i.status === 'blocked').length;
            
            document.getElementById('resolvedCount').textContent = resolved;
            document.getElementById('inProgressCount').textContent = inProgress;
            document.getElementById('blockedCount').textContent = blocked;
            document.getElementById('totalCount').textContent = issuesList.length;
        }

        function filterIssuesBySearch() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            if (!search) return issues;
            
            return issues.filter(issue => 
                issue.title.toLowerCase().includes(search) ||
                issue.description?.toLowerCase().includes(search) ||
                issue.fix?.toLowerCase().includes(search) ||
                issue.files?.toLowerCase().includes(search)
            );
        }

        function filterIssues() {
            renderIssues();
        }

        function showAddIssueModal() {
            document.getElementById('addIssueModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('addIssueModal').classList.remove('active');
            document.getElementById('addIssueForm').reset();
        }

        function addIssue(event) {
            event.preventDefault();
            
            const newIssue = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                title: document.getElementById('issueTitle').value,
                description: document.getElementById('issueDescription').value,
                status: document.getElementById('issueStatus').value,
                severity: document.getElementById('issueSeverity').value,
                fix: document.getElementById('issueFix').value,
                files: document.getElementById('issueFiles').value
            };
            
            issues.unshift(newIssue); // Add to beginning
            saveIssues();
            renderIssues();
            closeModal();
        }

        function deleteIssue(index) {
            if (confirm('Are you sure you want to delete this issue?')) {
                issues.splice(index, 1);
                saveIssues();
                renderIssues();
            }
        }

        function refreshDashboard() {
            loadIssues();
            renderIssues();
            updateCurrentDate();
        }

        function exportToJSON() {
            const dataStr = JSON.stringify({
                date: new Date().toDateString(),
                exported: new Date().toISOString(),
                issues: issues
            }, null, 2);
            
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `issues-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function getStatusText(status) {
            const statusMap = {
                'resolved': '✅ Resolved',
                'in-progress': '🔄 In Progress',
                'blocked': '🚫 Blocked'
            };
            return statusMap[status] || status;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
