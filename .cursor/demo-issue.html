<!DOCTYPE html>
<html>
<head>
    <title>Add Demo Issue</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }
        h1 { color: #2d3748; margin-bottom: 20px; }
        .message { color: #718096; margin-bottom: 30px; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
        }
        button:hover { background: #5568d3; }
        .success { color: #48bb78; font-weight: 600; display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Dashboard Demo Setup</h1>
        <p class="message">Click below to add sample issues to your dashboard so you can see how it works!</p>
        
        <button onclick="addDemoIssues()">✨ Add Demo Issues</button>
        <button onclick="window.location.href='dashboard.html'">📊 Open Dashboard</button>
        
        <div class="success" id="success">
            ✅ Demo issues added! Opening dashboard...
        </div>
    </div>

    <script>
        function addDemoIssues() {
            const STORAGE_KEY = 'axesimplify-daily-issues';
            
            const demoIssues = [
                {
                    id: Date.now() + 1,
                    timestamp: new Date(Date.now() - 3600000).toISOString(), // 1 hour ago
                    title: "React input values not persisting on autofill",
                    description: "When autofilling forms on React-based websites, values appear briefly then disappear",
                    status: "resolved",
                    severity: "critical",
                    fix: "Used native property descriptor setters and dispatched input/change events. Implemented in shared/react-input.ts module",
                    files: "src/shared/react-input.ts, src/content.ts"
                },
                {
                    id: Date.now() + 2,
                    timestamp: new Date(Date.now() - 7200000).toISOString(), // 2 hours ago
                    title: "Form autofill race conditions with page load",
                    description: "Autofill operations racing with React hydration and async data fetching",
                    status: "resolved",
                    severity: "high",
                    fix: "Implemented page stability gates: waitForPageStability() monitors DOM mutations, hasPendingRequests() checks Performance API",
                    files: "src/content.ts"
                },
                {
                    id: Date.now() + 3,
                    timestamp: new Date(Date.now() - 1800000).toISOString(), // 30 min ago
                    title: "Shadow DOM elements not accessible",
                    description: "querySelector returning null for elements inside Web Components",
                    status: "in-progress",
                    severity: "medium",
                    fix: "Working on recursive shadow root traversal function",
                    files: "src/content.ts"
                },
                {
                    id: Date.now() + 4,
                    timestamp: new Date(Date.now() - 900000).toISOString(), // 15 min ago
                    title: "Dashboard real-time tracking implementation",
                    description: "Created local HTML dashboard for tracking daily issues with real-time updates",
                    status: "resolved",
                    severity: "low",
                    fix: "Built dashboard.html with localStorage persistence, auto-refresh every 5 seconds, and beautiful UI",
                    files: ".cursor/dashboard.html"
                }
            ];
            
            const data = {
                date: new Date().toDateString(),
                issues: demoIssues,
                timestamp: new Date().toISOString()
            };
            
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            document.getElementById('success').style.display = 'block';
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>
</body>
</html>
