<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Applications Dashboard - Offlyn</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #1a1a1a;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left h1 {
      color: #2d3748;
      font-size: 1.8em;
      margin-bottom: 5px;
    }

    .header-left .subtitle {
      color: #718096;
      font-size: 0.9em;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .header-actions button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .header-actions button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
    }

    /* Stats Cards */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      text-align: center;
      transition: transform 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-3px);
    }

    .stat-card .number {
      font-size: 2.5em;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-card .label {
      color: #718096;
      font-size: 0.85em;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .stat-card.total .number { color: #667eea; }
    .stat-card.submitted .number { color: #4299e1; }
    .stat-card.interviewing .number { color: #ed8936; }
    .stat-card.rejected .number { color: #f56565; }
    .stat-card.accepted .number { color: #48bb78; }
    .stat-card.rate .number { color: #805ad5; }

    /* Kanban Board */
    .kanban-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 25px;
      margin-bottom: 25px;
    }

    .kanban-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .kanban-header h2 {
      color: #2d3748;
      font-size: 1.3em;
    }

    .search-box {
      display: flex;
      gap: 10px;
    }

    .search-box input {
      padding: 8px 15px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      min-width: 250px;
      font-family: inherit;
    }

    .search-box input:focus {
      outline: none;
      border-color: #667eea;
    }

    .kanban-board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .kanban-column {
      background: #f7fafc;
      border-radius: 12px;
      padding: 15px;
      min-height: 400px;
      transition: background 0.2s;
    }

    .kanban-column.drag-over {
      background: #ebf4ff;
      outline: 2px dashed #667eea;
      outline-offset: -4px;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9em;
    }

    .column-header .count {
      background: rgba(255, 255, 255, 0.9);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.85em;
    }

    .column-header.submitted { background: #bee3f8; color: #2c5282; }
    .column-header.interviewing { background: #feebc8; color: #7c2d12; }
    .column-header.rejected { background: #fed7d7; color: #742a2a; }
    .column-header.accepted { background: #c6f6d5; color: #22543d; }
    .column-header.withdrawn { background: #e2e8f0; color: #4a5568; }

    .column-cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Application Card */
    .app-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 15px;
      cursor: grab;
      transition: all 0.3s;
      position: relative;
    }

    .app-card:active {
      cursor: grabbing;
    }

    .app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.15);
      border-color: #667eea;
    }

    .app-card.dragging {
      opacity: 0.4;
      transform: rotate(2deg);
    }

    .app-card-header {
      margin-bottom: 10px;
    }

    .app-card-title {
      font-weight: 700;
      font-size: 1em;
      color: #2d3748;
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .app-card-company {
      color: #718096;
      font-size: 0.9em;
      font-weight: 600;
    }

    .app-card-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
      color: #a0aec0;
      font-size: 0.8em;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
    }

    .app-card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .app-card-actions button {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-edit {
      background: #edf2f7;
      color: #4a5568;
    }

    .btn-edit:hover {
      background: #e2e8f0;
    }

    .btn-delete {
      background: #fed7d7;
      color: #742a2a;
    }

    .btn-delete:hover {
      background: #fc8181;
      color: white;
    }

    .ats-badge {
      background: #edf2f7;
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 0.75em;
      color: #4a5568;
      display: inline-block;
      margin-top: 5px;
    }

    /* Charts */
    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .chart-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .chart-card h3 {
      color: #2d3748;
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    .chart-container {
      position: relative;
      height: 300px;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h2 {
      margin-bottom: 20px;
      color: #2d3748;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #4a5568;
      font-weight: 600;
      font-size: 0.9em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-secondary {
      flex: 1;
      background: #e2e8f0;
      color: #4a5568;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      opacity: 0.9;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #718096;
    }

    .empty-state h3 {
      font-size: 1.2em;
      margin-bottom: 10px;
      color: #2d3748;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #718096;
    }

    .loading-spinner {
      border: 4px solid #e2e8f0;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
      }

      .kanban-board {
        grid-template-columns: 1fr;
      }

      .charts {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <h1>Job Applications Dashboard</h1>
        <div class="subtitle" id="dateRange">Loading...</div>
      </div>
      <div class="header-actions">
        <button id="exportBtn">Export CSV</button>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats">
      <div class="stat-card total">
        <div class="number" id="statTotal">0</div>
        <div class="label">Total</div>
      </div>
      <div class="stat-card submitted">
        <div class="number" id="statSubmitted">0</div>
        <div class="label">Submitted</div>
      </div>
      <div class="stat-card interviewing">
        <div class="number" id="statInterviewing">0</div>
        <div class="label">Interviewing</div>
      </div>
      <div class="stat-card accepted">
        <div class="number" id="statAccepted">0</div>
        <div class="label">Accepted</div>
      </div>
      <div class="stat-card rejected">
        <div class="number" id="statRejected">0</div>
        <div class="label">Rejected</div>
      </div>
      <div class="stat-card rate">
        <div class="number" id="statRate">0%</div>
        <div class="label">Response Rate</div>
      </div>
    </div>

    <!-- Kanban Board -->
    <div class="kanban-container">
      <div class="kanban-header">
        <h2>Applications</h2>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by company or position...">
        </div>
      </div>
      <div id="kanbanContent">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Loading applications...</p>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts">
      <div class="chart-card">
        <h3>Applications Over Time</h3>
        <div class="chart-container">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <h3>Status Distribution</h3>
        <div class="chart-container">
          <canvas id="statusChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2>Edit Application</h2>
      <form id="editForm">
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="editCompany" readonly>
        </div>
        <div class="form-group">
          <label>Position</label>
          <input type="text" id="editPosition" readonly>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editStatus" required>
            <option value="submitted">Submitted</option>
            <option value="interviewing">Interviewing</option>
            <option value="rejected">Rejected</option>
            <option value="accepted">Accepted</option>
            <option value="withdrawn">Withdrawn</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="editNotes" placeholder="Add notes about this application..."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Save</button>
          <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
