<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offlyn Apply</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    /* ── Header ─── */
    .header {
      background: linear-gradient(90deg, #1e293b 0%, #334155 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      height: 42px;
      width: auto;
      object-fit: contain;
    }
    .header-title {
      font-weight: 700; font-size: 16px; color: #fff; letter-spacing: .3px;
    }
    .header-toggle {
      position: relative;
      width: 42px; height: 24px;
      background: rgba(255,255,255,.25);
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s;
    }
    .header-toggle.active { background: #16a34a; }
    .header-toggle::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      top: 2px; left: 2px;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .header-toggle.active::after { transform: translateX(18px); }

    /* ── Job detection bar ─── */
    .job-bar {
      margin: 0 18px;
      margin-top: -1px;
      padding: 10px 14px;
      background: #2d3a4a;
      border-radius: 0 0 10px 10px;
      font-size: 12px;
      color: rgba(255,255,255,.7);
    }
    .job-bar-detected {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .job-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .job-bar-label {
      font-weight: 700;
      color: #fff;
      font-size: 13px;
      line-height: 1.2;
    }
    .job-bar-detail {
      color: rgba(255,255,255,.6);
      font-size: 12px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .job-bar-empty {
      color: rgba(255,255,255,.4);
      font-style: italic;
      font-size: 12px;
    }

    /* ── Body ─── */
    .body { padding: 16px 18px; }

    /* ── Primary action buttons ─── */
    .actions { margin-bottom: 4px; }

    .btn-primary-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 16px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      color: #fff;
      background: #16a34a;
      margin-bottom: 8px;
    }
    .btn-primary-action:hover {
      background: #15803d;
      box-shadow: 0 4px 14px rgba(22, 163, 74, .35);
      transform: translateY(-1px);
    }
    .btn-primary-action:active { transform: translateY(0); }
    .btn-primary-action svg { flex-shrink: 0; }

    .btn-secondary-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      color: #1e2a3a;
      background: #fff;
      margin-bottom: 8px;
    }
    .btn-secondary-action:hover {
      border-color: #1e2a3a;
      background: #f9fafb;
      transform: translateY(-1px);
    }
    .btn-secondary-action:active { transform: translateY(0); }
    .btn-secondary-action svg { flex-shrink: 0; }

    /* ── Divider ─── */
    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 8px 0;
    }

    /* ── Nav links ─── */
    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 11px 4px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
      border-radius: 8px;
    }
    .nav-link:hover { background: #f5f7fa; color: #1e2a3a; }
    .nav-link svg { flex-shrink: 0; color: #64748b; }

    /* ── Stats row ─── */
    .stats {
      display: flex;
      gap: 10px;
      margin: 4px 0 8px;
    }
    .stat-card {
      flex: 1;
      padding: 12px;
      background: #f7f8fa;
      border-radius: 10px;
      text-align: center;
    }
    .stat-label {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: #1e2a3a;
      line-height: 1;
    }

    /* ── Advanced toggle ─── */
    .advanced-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 10px 4px;
      width: 100%;
      font-family: inherit;
      transition: color .15s;
    }
    .advanced-toggle:hover { color: #1e2a3a; }
    .advanced-toggle .arrow {
      display: inline-block;
      transition: transform .2s;
      font-size: 10px;
    }
    .advanced-toggle.open .arrow { transform: rotate(180deg); }

    .advanced-panel {
      display: none;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0 8px;
    }
    .advanced-panel.open { display: flex; }

    .btn-adv {
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      color: #555;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
      font-family: inherit;
    }
    .btn-adv:hover {
      background: #f9fafb;
      border-color: #cbd5e1;
      color: #333;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #64748b;
      padding: 4px 0;
    }
    .mini-toggle {
      position: relative;
      width: 32px; height: 18px;
      background: #ddd;
      border-radius: 9px;
      cursor: pointer;
      transition: background .2s;
    }
    .mini-toggle.active { background: #7cb342; }
    .mini-toggle::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 2px; left: 2px;
      transition: transform .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.15);
    }
    .mini-toggle.active::after { transform: translateX(14px); }

    /* ── Ollama status bar / footer ─── */
    .ollama-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      font-size: 12px;
      color: #64748b;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }
    .ollama-bar svg { flex-shrink: 0; }
    .ollama-status {
      margin-left: auto;
      font-weight: 600;
      font-size: 12px;
    }
    .ollama-status.connected { color: #16a34a; }
    .ollama-status.disconnected { color: #dc2626; }

    /* ── Footer nav links ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 12px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }
    .footer-link {
      background: none;
      border: none;
      color: #64748b;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 5px;
      transition: all .15s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .footer-link:hover {
      background: #e2e8f0;
      color: #1e293b;
    }
    .footer-link svg { flex-shrink: 0; }
    .footer-divider {
      width: 1px;
      height: 12px;
      background: #e2e8f0;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <img class="header-logo" src="../icons/primary-logo.png" alt="Offlyn Apply">
    </div>
    <div class="header-toggle active" id="enabled-toggle" title="Enable / Disable" role="switch" aria-checked="true" aria-label="Enable or disable extension" tabindex="0"></div>
  </div>

  <!-- Job detection bar -->
  <div class="job-bar" id="job-info">
    <div class="job-bar-empty">No job detected yet</div>
  </div>

  <!-- Profile completeness warning (shown only when profile is incomplete) -->
  <div id="profile-warning" style="display:none; background:#fff7ed; border-top:2px solid #f97316; padding:8px 12px; font-size:11px; color:#92400e; line-height:1.4;"></div>

  <div class="body">
    <!-- Primary actions -->
    <div class="actions">
      <button class="btn-primary-action" id="manual-autofill-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/><path d="M19 13l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/></svg>
        Auto-Fill Application
      </button>
      <button class="btn-secondary-action" id="cover-letter-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Generate Cover Letter
      </button>
    </div>

    <div class="divider"></div>

    <!-- Navigation links -->
    <button class="nav-link" id="profile-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Manage Profile
    </button>
    <button class="nav-link" id="view-dashboard-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      View Dashboard
    </button>

    <div class="divider"></div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Applications</div>
        <div class="stat-num" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Interviewing</div>
        <div class="stat-num" id="stat-interviewing" style="color:#16a34a;">0</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Advanced tools (collapsed) -->
    <button class="advanced-toggle" id="advanced-toggle" aria-expanded="false" aria-controls="advanced-panel">
      Advanced <span class="arrow">&#9661;</span>
    </button>
    <div class="advanced-panel" id="advanced-panel">
      <div class="toggle-row">
        <span>Dry Run</span>
        <div class="mini-toggle" id="dryrun-toggle" role="switch" aria-checked="false" aria-label="Toggle dry run mode" tabindex="0"></div>
      </div>
      <button class="btn-adv" id="view-learned-btn">View Learned Values</button>
      <button class="btn-adv" id="clean-selfid-btn">Clean Self-ID Data</button>
      <button class="btn-adv" id="debug-profile-btn">Debug Profile Data</button>
      <button class="btn-adv" id="copy-summary-btn">Copy Daily Summary</button>
    </div>

  </div>

  <!-- Footer nav links -->
  <div class="footer">
    <button class="footer-link" id="home-btn" aria-label="Open home page">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <div class="footer-divider"></div>
    <button class="footer-link" id="settings-btn" aria-label="Open settings">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
    <div class="footer-divider"></div>
    <button class="footer-link" id="help-btn" aria-label="Open help">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Help
    </button>
    <div class="footer-divider"></div>
    <button class="footer-link" id="privacy-btn" aria-label="Open privacy policy">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Privacy
    </button>
  </div>

  <!-- Ollama status footer -->
  <div class="ollama-bar" id="ollama-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
    Ollama
    <span class="ollama-status" id="ollama-status">--</span>
  </div>

  <!-- Hidden elements for summary -->
  <div class="summary-status" id="summary-status" style="display:none;"></div>
  <textarea id="summary-text" style="display:none;"></textarea>
  <div id="error-text" style="display:none;"></div>

  <script src="popup.js"></script>
</body>
</html>
