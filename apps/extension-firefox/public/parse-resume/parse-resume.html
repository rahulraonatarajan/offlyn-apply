<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offlyn – Parse resume (local)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #f0f4f0;
      min-height: 100vh;
      padding: 24px;
    }
    .page {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .section { padding: 20px 24px; border-bottom: 1px solid #eee; }
    .section:last-child { border-bottom: none; }
    h1 { font-size: 20px; margin-bottom: 6px; color: #1a3d1a; }
    .sub { font-size: 13px; color: #666; margin-bottom: 16px; }
    .status {
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .status.connected { background: #e8f5e9; color: #2e7d32; }
    .status.disconnected { background: #ffebee; color: #c62828; }
    .status-actions { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
    textarea {
      width: 100%;
      min-height: 160px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: #2e7d32; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #2e7d32; color: #fff; }
    .btn-primary:hover { background: #1b5e20; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #d0d0d0; }
    .actions { margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .result {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 320px;
      overflow: auto;
    }
    .result.success { background: #e8f5e9; border: 1px solid #c8e6c9; color: #1b5e20; }
    .result.error { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; }
    .result.empty { background: #f5f5f5; color: #666; }
  </style>
</head>
<body>
  <div class="page">
    <div class="section">
      <h1>Parse resume (local)</h1>
      <p class="sub">Paste resume text or load a .txt file. Uses Ollama via the extension native host.</p>
      <div class="status" id="status">Checking connection…</div>
      <div class="status-actions">
        <button type="button" class="btn btn-secondary" id="retry-btn" style="display: none;">Retry connection</button>
      </div>
    </div>
    <div class="section">
      <label for="resume-text">Resume text</label>
      <textarea id="resume-text" placeholder="Paste your resume or key details here…"></textarea>
      <div class="actions">
        <button type="button" class="btn btn-secondary" id="load-txt">Load .txt file</button>
        <input type="file" id="file-input" accept=".txt" style="display: none;" />
        <button type="button" class="btn btn-primary" id="parse-btn">Parse resume</button>
      </div>
    </div>
    <div class="section">
      <label>Result</label>
      <div class="result empty" id="result">No result yet. Click Parse resume.</div>
    </div>
  </div>
  <script src="parse-resume.js"></script>
</body>
</html>
