<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offlyn – Job detected</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #f0f4f0;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      padding: 24px;
    }
    .card h1 { font-size: 18px; margin-bottom: 8px; color: #1a3d1a; }
    .card .company { color: #666; font-size: 14px; margin-bottom: 20px; }
    .card .hostname { font-size: 12px; color: #999; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #1b5e20; }
    .btn.secondary { background: #1976d2; }
    .btn.secondary:hover { background: #1565c0; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="job-title">Job detected</h1>
    <p class="company" id="job-company"></p>
    <p class="hostname" id="job-hostname"></p>
    <div class="actions">
      <button type="button" class="btn" id="btn-focus">Focus application tab</button>
      <a href="#" id="link-onboarding" class="btn secondary">Set up profile</a>
    </div>
  </div>
  <script src="job-detected.js"></script>
</body>
</html>
