name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-firefox:
    name: Build & Test (Firefox)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension-firefox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/extension-firefox/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  build-and-test-chrome:
    name: Build & Test (Chrome)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension-chrome

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/extension-chrome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
