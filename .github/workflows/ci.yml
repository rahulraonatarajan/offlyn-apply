name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

# ──────────────────────────────────────────────────────────────────────────────
# Reusable per-extension check logic is defined as a matrix so Chrome is
# added automatically when apps/extension-chrome/package.json lands.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Firefox ────────────────────────────────────────────────────────────────
  firefox:
    name: Firefox — Build, Type-check, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension-firefox
    outputs:
      bundle-report: ${{ steps.bundle.outputs.report }}
      tsc-errors: ${{ steps.typecheck.outputs.error_count }}
      lint-errors: ${{ steps.lint.outputs.error_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/extension-firefox/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Must-pass checks ───────────────────────────────────────────────────
      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # ── Improvement-flagging checks (annotate but don't block PRs) ─────────
      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: |
          set +e
          tsc_output=$(npx tsc --noEmit 2>&1)
          exit_code=$?
          error_count=$(echo "$tsc_output" | grep -c "error TS" || true)
          echo "$tsc_output"
          echo "error_count=$error_count" >> "$GITHUB_OUTPUT"
          # Emit GitHub annotations for every error line
          while IFS= read -r line; do
            if [[ "$line" =~ ^(.+)\(([0-9]+),([0-9]+)\):\ error\ (TS[0-9]+):\ (.+)$ ]]; then
              file="${BASH_REMATCH[1]}"
              row="${BASH_REMATCH[2]}"
              col="${BASH_REMATCH[3]}"
              msg="${BASH_REMATCH[4]}: ${BASH_REMATCH[5]}"
              echo "::warning file=apps/extension-firefox/$file,line=$row,col=$col::$msg"
            fi
          done <<< "$tsc_output"
          # Write to step summary
          {
            echo "### TypeScript — Firefox"
            echo "**$error_count type error(s)**"
            if [ "$error_count" -gt 0 ]; then
              echo '```'
              echo "$tsc_output" | head -60
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          set +e
          lint_output=$(npx eslint src --format compact 2>&1)
          exit_code=$?
          error_count=$(echo "$lint_output" | grep -c ": error " || true)
          warn_count=$(echo "$lint_output" | grep -c ": warning " || true)
          echo "$lint_output"
          echo "error_count=$error_count" >> "$GITHUB_OUTPUT"
          # Write to step summary
          {
            echo "### ESLint — Firefox"
            echo "**$error_count error(s), $warn_count warning(s)**"
            if [ "$exit_code" -ne 0 ]; then
              echo '```'
              echo "$lint_output" | head -80
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Bundle size capture ────────────────────────────────────────────────
      - name: Capture bundle sizes
        id: bundle
        run: |
          TOTAL=$(du -sh dist | cut -f1)
          JS_SIZES=$(find dist -name "*.js" | sort | while read -r f; do
            size=$(du -sh "$f" | cut -f1)
            echo "  $size  ${f#dist/}"
          done)
          REPORT="**Firefox** — total \`$TOTAL\`
          \`\`\`
          $JS_SIZES
          \`\`\`"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Step summary
          {
            echo "### Bundle — Firefox (total: $TOTAL)"
            echo '```'
            echo "$JS_SIZES"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Chrome (auto-activates when apps/extension-chrome/package.json exists) ─
  chrome:
    name: Chrome — Build, Type-check, Lint & Test
    runs-on: ubuntu-latest
    if: hashFiles('apps/extension-chrome/package.json') != ''
    defaults:
      run:
        working-directory: apps/extension-chrome
    outputs:
      bundle-report: ${{ steps.bundle.outputs.report }}
      tsc-errors: ${{ steps.typecheck.outputs.error_count }}
      lint-errors: ${{ steps.lint.outputs.error_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/extension-chrome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Type-check
        id: typecheck
        continue-on-error: true
        run: |
          set +e
          tsc_output=$(npx tsc --noEmit 2>&1)
          error_count=$(echo "$tsc_output" | grep -c "error TS" || true)
          echo "$tsc_output"
          echo "error_count=$error_count" >> "$GITHUB_OUTPUT"
          while IFS= read -r line; do
            if [[ "$line" =~ ^(.+)\(([0-9]+),([0-9]+)\):\ error\ (TS[0-9]+):\ (.+)$ ]]; then
              file="${BASH_REMATCH[1]}"
              row="${BASH_REMATCH[2]}"
              col="${BASH_REMATCH[3]}"
              msg="${BASH_REMATCH[4]}: ${BASH_REMATCH[5]}"
              echo "::warning file=apps/extension-chrome/$file,line=$row,col=$col::$msg"
            fi
          done <<< "$tsc_output"
          {
            echo "### TypeScript — Chrome"
            echo "**$error_count type error(s)**"
            if [ "$error_count" -gt 0 ]; then
              echo '```'
              echo "$tsc_output" | head -60
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          set +e
          lint_output=$(npx eslint src --format compact 2>&1)
          exit_code=$?
          error_count=$(echo "$lint_output" | grep -c ": error " || true)
          warn_count=$(echo "$lint_output" | grep -c ": warning " || true)
          echo "$lint_output"
          echo "error_count=$error_count" >> "$GITHUB_OUTPUT"
          {
            echo "### ESLint — Chrome"
            echo "**$error_count error(s), $warn_count warning(s)**"
            if [ "$exit_code" -ne 0 ]; then
              echo '```'
              echo "$lint_output" | head -80
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Capture bundle sizes
        id: bundle
        run: |
          TOTAL=$(du -sh dist | cut -f1)
          JS_SIZES=$(find dist -name "*.js" | sort | while read -r f; do
            size=$(du -sh "$f" | cut -f1)
            echo "  $size  ${f#dist/}"
          done)
          REPORT="**Chrome** — total \`$TOTAL\`
          \`\`\`
          $JS_SIZES
          \`\`\`"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          {
            echo "### Bundle — Chrome (total: $TOTAL)"
            echo '```'
            echo "$JS_SIZES"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── PR comment with consolidated report ────────────────────────────────────
  pr-report:
    name: Post PR improvement report
    runs-on: ubuntu-latest
    needs: [firefox]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write

    steps:
      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const firefoxBundle  = `${{ needs.firefox.outputs.bundle-report }}`;
            const firefoxTsc     = '${{ needs.firefox.outputs.tsc-errors }}';
            const firefoxLint    = '${{ needs.firefox.outputs.lint-errors }}';

            const tscBadge  = (n) => n === '0' ? '✅ 0 errors' : `⚠️ ${n} error(s)`;
            const lintBadge = (n) => n === '0' ? '✅ 0 errors' : `⚠️ ${n} error(s)`;

            const body = [
              '<!-- offlyn-ci-report -->',
              '## CI Improvement Report',
              '',
              '| Check | Firefox |',
              '|-------|---------|',
              `| TypeScript | ${tscBadge(firefoxTsc)} |`,
              `| ESLint errors | ${lintBadge(firefoxLint)} |`,
              '',
              '> Type errors and lint issues are **warnings** — they do not block merging.',
              '> Fix them over time to keep the codebase healthy.',
              '',
              '### Bundle sizes',
              firefoxBundle,
              '',
              `_Updated on commit \`${context.sha.slice(0, 7)}\`_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes('<!-- offlyn-ci-report -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
